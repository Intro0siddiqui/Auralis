name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cd auralis && ./gradlew shared:desktopTest

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cd auralis && ./gradlew :desktop:packageDeb
      - uses: actions/upload-artifact@v4
        with:
          name: auralis-linux-x86_64
          path: auralis/desktop/build/compose/binaries/main/deb/*.deb

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cd auralis && ./gradlew :desktop:packageDmg
      - uses: actions/upload-artifact@v4
        with:
          name: auralis-mac-universal
          path: auralis/desktop/build/compose/binaries/main/dmg/*.dmg

  build-mac-intel:
    needs: test
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cd auralis && ./gradlew :desktop:packageDmg
      - uses: actions/upload-artifact@v4
        with:
          name: auralis-mac-intel
          path: auralis/desktop/build/compose/binaries/main/dmg/*.dmg

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cd auralis && ./gradlew :android:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: auralis-android
          path: auralis/android/build/outputs/apk/release/*.apk

  release:
    if: github.event_name == 'release'
    needs: [build-linux, build-mac, build-mac-intel, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in auralis-linux-x86_64 auralis-mac-universal auralis-mac-intel auralis-android; do
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                gh release upload "${{ github.event.release.tag_name }}" "$file" --clobber
              fi
            done
          done
